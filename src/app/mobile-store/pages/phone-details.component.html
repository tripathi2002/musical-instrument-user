<div class="details-wrapper glass">
    <div class="details-header">
        <div class="brand-badge" *ngIf="product?.brand">{{product.brand.title}}</div>
        <button class="close-btn" (click)="onClose()">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>

    <div class="details-content" *ngIf="product">
        <!-- Image Showcase -->
        <div class="image-gallery">
            <div class="main-image-container">
                <ng-container *ngIf="product?.images?.length > 0">
                    <img [src]="product.images[0].url" [alt]="product.title">
                </ng-container>
            </div>
            <div class="thumbnail-list" *ngIf="product?.images?.length > 1">
                <div class="thumbnail" *ngFor="let image of product.images">
                    <img [src]="image.url" alt="thumbnail">
                </div>
            </div>
        </div>

        <!-- Product Info -->
        <div class="product-info">
            <div class="info-header">
                <h1 class="product-title">{{product.title}}</h1>
                <div class="product-rating" *ngIf="product.totalrating">
                    <i class="fa-solid fa-star"></i>
                    <span>{{product.totalrating}}</span>
                </div>
            </div>

            <div class="price-section">
                <span class="currency">Rs.</span>
                <span class="amount">{{product.price}}</span>
            </div>

            <div class="spec-section">
                <div class="spec-item">
                    <span class="spec-label">Category</span>
                    <span class="spec-value">{{product.category?.title || 'Smartphones'}}</span>
                </div>
                <div class="spec-item">
                    <span class="spec-label">Color</span>
                    <span class="spec-value">{{product.color}}</span>
                </div>
            </div>

            <div class="description-section">
                <h3 class="section-title">Overview</h3>
                <p class="description">{{product.description}}</p>
            </div>

            <div class="action-section">
                <div class="quantity-selector">
                    <button class="qty-btn" (click)="count = count > 1 ? count - 1 : 1">
                        <i class="fa-solid fa-minus"></i>
                    </button>
                    <span class="qty-value">{{count}}</span>
                    <button class="qty-btn" (click)="count = count + 1">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
                <button class="btn-premium flex-1" (click)="addToCart()">
                    <i class="fa-solid fa-cart-plus"></i>
                    <span>ADD TO CART</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Feedback & Loading -->
    <div class="action-container">
        <div class="message-toast glass" *ngIf="isError || isSuccess" [@error]="isError?'start':'end'" [@success]="isSuccess?'start':'end'">
            <span>{{message}}</span>
        </div>
        
        <div class="loading-overlay" *ngIf="isLoading">
            <div class="loader"></div>
        </div>
    </div>
</div>
