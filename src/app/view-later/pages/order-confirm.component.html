<div class="confirm-modal glass">
    <div class="modal-header">
        <div class="modal-icon">
            <i class="fa-solid fa-cart-check"></i>
        </div>
        <h2 class="modal-title">Ready to place your order?</h2>
        <p class="modal-subtitle">Your items will be reserved and shipped as soon as the order is confirmed.</p>
    </div>

    <div class="modal-actions">
        <button class="btn-premium w-full" (click)="onSubmit()">Confirm Order</button>
        <button class="btn-outline w-full" (click)="dialogRef.close()">Cancel</button>
    </div>

    <!-- Feedback & Loading -->
    <div class="action-container">
        <div class="message glass" *ngIf="isError || isSuccess" [@error]="isError?'start':'end'" [@success]="isSuccess?'start':'end'">
            <span>{{message}}</span>
        </div>
        
        <div class="loading-overlay" *ngIf="isLoading">
            <div class="loader"></div>
        </div>
    </div>
</div>
